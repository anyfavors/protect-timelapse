version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python (pip)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  # npm (Tailwind CSS build)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      npm-deps:
        patterns: ["*"]

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
